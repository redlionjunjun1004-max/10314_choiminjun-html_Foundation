<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호텔 체크인 관리</title>
    <style>
        @font-face {
    font-family: 'ElegantSerif';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Regular.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'ElegantSerif';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}
@font-face {
    font-family: 'IAmAPlayer';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/IAMAPLAYER.woff2') format('woff2');
    font-weight: normal;
    font-display: swap;
}
body{
    background-color: #25282a;
    color:#71c5e8;
    font-family: 'ElegantSerif','IAmAPlayer';
}
 h1{
    color:#971b2f
 }
 p{
    font-size: 18px;
    color:#971b2f
 }
 .wrap{
    background-color: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 20px;
    width: 50%;
    /*상하,좌우*/
    margin:20px auto 0;
 }
 img{
    width: 100%;
    border-radius: 10px;
 }
 .checkin_wrap{
    background-color: #25282a;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
 }
 .checkin_wrap h2{
    margin-top: 5px;
 }
 .room_wrap{
    background-color:#25282a;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
 }
 input{
    width: 70%;
    padding: 12px;
    border:none;
    border-radius: 10px;
    outline: none;
    font-size: 16px;

 }
 button{
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background-color: #971b2f;
    color:#71c5e8;
    cursor: pointer;
    font-weight: bold ;
}
button:hover{
    background-color: #25282a
}
ul{
    padding-left: 20px;
}
li{
    margin: 10px 0;
    padding:10px;
    background-color: rgba(255,255,255,0.1);
    border-radius: 5px;
}
#room_cnt{
    font-size: 30px;
    color: #ffe7c2;
    font-weight: 700;
}
    </style>
</head>
<body>
    <div class="wrap">
    <!--0.소개-->
    <h1>프리티 호텔 체크인 관리</h1>
    <p>프리티 호텔의 체크인/체크아웃을 관리하는 웹페이지입니다</p>
    <img src ="./hotel.png"alt = "호텔이미지입니다.">
    <div class ="checkin_wrap">
    <h2>체크인 목록</h2>
    <ul id="checkin_list">
        <li>라피</li>
        <li>아니스</li>
        <li>네온</li>
    </ul>
        </div>
            <!--3.체크인-->
        <div class ="checkin_wrap">
            <h2>체크인</h2>
            <input id="input_name" 
            type="text"
            placeholder="손님 이름을 입력하세요."
            >
            <button id="btn_checkin">체크인</button>
            </div>
            <!--체크아웃-->
        <div class ="checkin_wrap">
            <h2>체크아웃</h2>
            <input id="input_num" 
            type="number"
            placeholder="손님 순번을 입력하세요."
            />
            <button id="btn_checkout">체크아웃</button>
                </div>      
</div>
</body>
<script>

const checkin_list = document.getElementById("checkin_list");
let customerCount = checkin_list.children.length;
    function checkin(name){
        if (name.trim().length == 0){
            alert("이름을 입력하시요.");
            return false;
        }
        customerCount++;
        return true;
    }

    document.getElementById("btn_checkin").onclick = function(){
      const name =   document.getElementById("input_name").value;
       if (checkin(name)){
            const li = document.createElement("li");
            li.textContent = name;
            checkin_list.appendChild(li);
       };
    };
       document.getElementById("btn_checkout").onclick = function(){
       const num = document.getElementById("input_num").value;
       if (num <= customerCount && num >= 1){
        customerCount--;
        checkin_list.children[num - 1].remove();
       }else{
        alert(`1부터 ${customerCount}사이의값을 입력하시요`);
       }
       }
</script>
</html>
