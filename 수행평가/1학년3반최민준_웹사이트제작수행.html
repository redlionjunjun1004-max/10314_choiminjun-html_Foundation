<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
<style>
    body{
        background-color: rgb(238, 244, 255);
        font-family: "Noto Sans KR", sans-serif ;
    }
    h1{
        color:rgb(34, 76, 170);
    }
    /* 클래스 선택시 크래스명앞에 "."*/
    /* 아이디를 선택하려면 아이디명 앞에 '#' */
    .snack_wrap{
        width: 580px;
        margin:24px auto;
        padding: 18px;
        background-color: white;
        border-radius: 8px;
    }
    img{
        width: 100%;
        border-radius: 8px;
    }
    .snack_panel{
        margin-top: 18px;
        padding: 14px;
        background-color: rgb(216,232,255);
        border-radius: 8px;
    }
    .snack_panel li{
        margin-bottom: 8px;
    }
    .pick_panel{
        margin-top: 18px;
        padding: 14px;
        background-color: rgb(255,230,198);
        border-radius: 8px;
    }
    input{
        width: 360px;
        height: 34px;
    }
    button{
        height: 38px;
        background-color: rgb(34,76,170);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover{
        background-color: rgb(255,108,108);
    }
</style>
</head>
<body>
    <div class="snack_wrap">
        <h1>우리 반 간식 소개와 추첨</h1>
        <p>친구들과 함께 먹고 싶은 간식을 모아 추첨하는 웹 페이지입니다. .</p>
        <!--절대 경로-->
        <!-- "/", 프로젝트 최상위경로, 혹은 웹서버나 도메인의 최대 경로-->
        <!-- 상대 경로-->
        <!-- "./",현재 파일이 있는 폴더 -->
        <!-- "..", 현재 파일이 있는 폴더의 상위 폴더-->
        <!-- input, img등은 뒤에 / 붙여라 안붙여도 상관없음-->
        <img src="snackbar-hero_c3.png" alt="간식사진"/>
        <div class="snack_panel">
            <h2>인기 간식 목록</h2>
            <!--id = unordered list(정렬되지않은 리스트), 정렬된건 <ol>-->
            <!---->
            <ul id="snack_list">
            <!--li = list item-->
            </ul>
        </div>
        <div class ="snack_panel">
            <h2>간식 추가하기</h2>
            <input id ="snack_input" 
            type ="text"
            placeholder="추가할 간식 이름"
            />
        <button id = "add_snack_btn">추가</button>
        </div>
        <div class="pick_panel">
            <h2>오늘의 간식</h2>
            <p id="pick_result">버튼을 누르면 간식이 추첨됩니다.</p>
            <button id ="pick_snack_btn">간식추첨</button>
        </div>
    </div>
    <script>
        const snacks =[ "햄치즈 토스트", "딸기 라떼", "초코 머핀"];
        function renderSnack(snack){
            const li = document.createElement("li");
            li.textContent = snack;

            document.getElementById("snack_list").appendChild(li);

        }
        for (let i =0; i < snacks.length; i++){
            renderSnack(snacks[i]);
        }
        const addSnack = function(snack){
            if (snack.length > 0){
                snacks.push(snack);
                return true;
            }
            return false;
        };

        document.getElementById("add_snack_btn").onclick = function (){
            const snack = document.getElementById("snack_input").value;
            if (addSnack(snack)){
                renderSnack(snack)
            }else{
                alert("간식 이름을 입력하세요.");
            }
            //2. 간식리스트레추가한다 
            //2-1 만약 간식이름이 비었다면 안내문구를 출력하고 반환한다.
            //3. 추가된 간식들 그랴준다/표시한다

        };
        const getRandomNumber = function(n){
            return Math.floor(Math.random()*n);
        };

        document.getElementById("pick_snack_btn").onclick = function(){
            
            const randomNum= getRandomNumber(snacks.length);
            document.getElementById("pick_result").textContent =   

            `오늘의 간식은 ${snacks[randomNum]}입니다!`;
        };
    </script> 
</body>
</html>
